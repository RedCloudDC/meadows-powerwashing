<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meadows Powerwashing — Upload</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0c4a6e" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

<style>
  :root {
    --bg: #f7fafc; --surface: #fff; --ink: #0b1220; --ink-soft: #334155;
    --muted: #64748b; --line: #e2e8f0; --brand: #0c4a6e; --brand-2: #0369a1;
    --accent: #38bdf8; --accent-soft: #e0f2fe; --danger: #dc2626; --success: #16a34a;
    --shadow: 0 4px 14px rgba(12,74,110,.08); --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5; font-size: 16px;
    -webkit-font-smoothing: antialiased; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .container { max-width: 640px; margin: 0 auto; padding: 16px; }
  header { text-align: center; padding: 24px 16px 8px; }
  header h1 { margin: 4px 0 2px; font-size: 22px; }
  header p { color: var(--muted); margin: 0; font-size: 14px; }
  .logo-mark {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(160deg, var(--accent), var(--brand-2));
    color: #fff; display: inline-flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
  }
  .logo-mark svg { width: 22px; height: 22px; }

  .card {
    background: var(--surface); border-radius: var(--radius); padding: 20px;
    border: 1px solid var(--line); box-shadow: var(--shadow); margin-bottom: 16px;
  }
  h2 { margin: 0 0 14px; font-size: 18px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 14px; border: 1px solid var(--line); border-radius: 10px;
    font: inherit; background: #fff;
  }
  input:focus { outline: none; border-color: var(--brand-2); box-shadow: 0 0 0 3px rgba(3,105,161,.15); }

  .photo-field {
    display: block; border: 2px dashed var(--line); border-radius: 12px;
    padding: 18px; text-align: center; background: #fafafa;
    cursor: pointer; transition: border-color .15s, background .15s;
    margin-bottom: 12px;
  }
  .photo-field:hover { border-color: var(--brand-2); background: var(--accent-soft); }
  .photo-field .ico { color: var(--brand); font-size: 26px; line-height: 1; }
  .photo-field .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .photo-field.filled { border-color: var(--success); background: #f0fdf4; }
  .photo-field.filled .ico { color: var(--success); }
  .photo-field input[type="file"] { display: none; }
  .photo-preview {
    margin-top: 10px; display: block; max-height: 160px; border-radius: 8px;
    margin-left: auto; margin-right: auto;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 18px; border-radius: 999px; border: 0; cursor: pointer;
    font-weight: 700; font-size: 16px; text-decoration: none; width: 100%;
  }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:disabled { background: var(--muted); cursor: wait; }
  .btn-ghost { background: transparent; color: var(--brand); border: 1px solid var(--line); }
  .btn svg { width: 18px; height: 18px; }

  #status {
    margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 14px;
    display: none;
  }
  #status.show { display: block; }
  #status.info { background: var(--accent-soft); color: var(--brand); }
  #status.ok { background: #dcfce7; color: #166534; }
  #status.err { background: #fee2e2; color: var(--danger); }

  .progress { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress span { display: block; height: 100%; background: var(--brand-2); width: 0; transition: width .2s; }

  .gallery-list {
    display: grid; grid-template-columns: 1fr; gap: 10px;
  }
  .g-item {
    display: grid; grid-template-columns: 60px 60px 1fr; gap: 10px; align-items: center;
    padding: 8px; border: 1px solid var(--line); border-radius: 10px; background: #fff;
  }
  .g-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; display: block; }
  .g-item .meta { font-size: 14px; }
  .g-item .meta b { display: block; }
  .g-item .meta small { color: var(--muted); }

  .topbar {
    background: var(--brand); color: #fff; padding: 10px; text-align: center;
    font-size: 13px;
  }
  .topbar a { color: #fff; font-weight: 600; }

  .row-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

  @supports (-webkit-touch-callout: none) {
    /* iOS fix for full-height on Safari */
    body { min-height: -webkit-fill-available; }
  }
</style>
</head>
<body>

<div class="topbar">
  Internal tool · <a href="index.html">View site →</a>
</div>

<header>
  <img src="images/logo.png" alt="Meadows Powerwashing" style="height:60px; width:auto; display:block; margin:0 auto 6px" />
  <h1 style="font-size:18px">Portfolio Upload</h1>
  <p>Add before/after shots from your phone</p>
</header>

<div class="container">

  <!-- ============ CONFIG NEEDED ============ -->
  <!-- These three constants are set once and never again. See ADMIN_GUIDE.md. -->
  <script>
    const CLOUD_NAME    = 'YOUR_CLOUD_NAME';     // e.g., "meadows-pw"
    const UPLOAD_PRESET = 'meadows_unsigned';    // Cloudinary unsigned preset name
    // SHA-256 hex digest of the admin passphrase. Default hash below is for "change-me-now".
    // Generate a new one by running the site's /set-passphrase bookmarklet, or paste a hash here.
    const PASSPHRASE_HASH = 'ccc0b903bce51fb554262d742d0a282e1f8a87d064f1cf44f8ff5148ca4beb42'; // "change-me-now" — change me (see ADMIN_GUIDE.md)
  </script>

  <!-- ============ LOCK SCREEN ============ -->
  <section id="auth" class="card" hidden>
    <h2>Unlock</h2>
    <label for="pass">Passphrase</label>
    <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" />
    <div class="row-btns">
      <button class="btn btn-primary" id="unlock">Unlock</button>
      <button class="btn btn-ghost" id="setpass">Set new passphrase</button>
    </div>
    <p id="auth-msg" style="color: var(--danger); font-size: 14px; margin: 10px 0 0; display: none;"></p>
  </section>

  <!-- ============ UPLOAD ============ -->
  <section id="app" class="card" hidden>
    <h2>Add a project</h2>
    <form id="upload-form">
      <label for="title">Project title</label>
      <input id="title" type="text" required placeholder="e.g., McLean driveway" style="margin-bottom: 14px" />

      <div class="row">
        <label class="photo-field" id="before-field">
          <div class="ico">📸</div>
          <b>Before</b>
          <div class="sub">Tap to choose</div>
          <img id="before-preview" class="photo-preview" hidden />
          <input id="before" type="file" accept="image/*" capture="environment" required />
        </label>
        <label class="photo-field" id="after-field">
          <div class="ico">✨</div>
          <b>After</b>
          <div class="sub">Tap to choose</div>
          <img id="after-preview" class="photo-preview" hidden />
          <input id="after" type="file" accept="image/*" capture="environment" required />
        </label>
      </div>

      <button class="btn btn-primary" id="submit" type="submit" style="margin-top: 14px">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zM5 18h14v2H5z"/></svg>
        Upload to portfolio
      </button>
      <div class="progress" hidden id="progress"><span></span></div>
      <div id="status"></div>
    </form>
  </section>

  <!-- ============ RECENT UPLOADS ============ -->
  <section id="recent-wrap" class="card" hidden>
    <h2>Recent uploads</h2>
    <div id="recent" class="gallery-list">Loading…</div>
    <button class="btn btn-ghost" id="refresh" style="margin-top: 14px">Refresh list</button>
    <p style="color: var(--muted); font-size: 13px; margin: 10px 0 0">
      Manage or delete items at
      <a href="https://cloudinary.com/console/media_library" target="_blank" rel="noopener">Cloudinary → Media Library</a>.
      Changes can take a few minutes to appear on the public site.
    </p>
  </section>

  <div style="text-align:center; margin-top: 16px">
    <button class="btn btn-ghost" id="logout" hidden>Log out of this device</button>
  </div>
</div>

<script>
// ---------- Auth (client-side passphrase, not crypto-secure but deters randos) ----------
async function sha256Hex(str) {
  const bytes = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showApp() {
  document.getElementById('auth').hidden = true;
  document.getElementById('app').hidden = false;
  document.getElementById('recent-wrap').hidden = false;
  document.getElementById('logout').hidden = false;
  loadRecent();
}
function showAuth() {
  document.getElementById('auth').hidden = false;
  document.getElementById('app').hidden = true;
  document.getElementById('recent-wrap').hidden = true;
  document.getElementById('logout').hidden = true;
}

async function tryUnlock(pass) {
  const h = await sha256Hex(pass);
  if (h === PASSPHRASE_HASH) {
    localStorage.setItem('meadows_auth', h);
    showApp();
    return true;
  }
  const msg = document.getElementById('auth-msg');
  msg.textContent = 'Nope, that\u2019s not it. Try again.';
  msg.style.display = 'block';
  return false;
}

document.getElementById('unlock').addEventListener('click', async (e) => {
  e.preventDefault();
  const pass = document.getElementById('pass').value;
  if (!pass) return;
  await tryUnlock(pass);
});
document.getElementById('pass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('unlock').click();
});

document.getElementById('setpass').addEventListener('click', async () => {
  const p1 = prompt('Set a new passphrase for this device:');
  if (!p1) return;
  const p2 = prompt('Type it again to confirm:');
  if (p1 !== p2) return alert('Didn\u2019t match — try again.');
  const h = await sha256Hex(p1);
  // IMPORTANT: this only updates localStorage for this browser. The baked-in PASSPHRASE_HASH
  // at the top of this file is the source of truth. Copy this value into admin.html and re-deploy
  // to make it permanent + usable on other devices:
  prompt('Copy this hash into admin.html (PASSPHRASE_HASH) and redeploy:', h);
  localStorage.setItem('meadows_auth', h);
  alert('Local passphrase set on this device. Update admin.html to make it permanent.');
});

document.getElementById('logout').addEventListener('click', () => {
  localStorage.removeItem('meadows_auth');
  showAuth();
});

// Auto-unlock
if (localStorage.getItem('meadows_auth') === PASSPHRASE_HASH) {
  showApp();
} else {
  showAuth();
}

// ---------- Photo previews ----------
function wirePreview(inputId, previewId, fieldId) {
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  const field = document.getElementById(fieldId);
  input.addEventListener('change', () => {
    const f = input.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.hidden = false;
      field.classList.add('filled');
    };
    reader.readAsDataURL(f);
  });
}
wirePreview('before', 'before-preview', 'before-field');
wirePreview('after',  'after-preview',  'after-field');

// ---------- Upload ----------
function setStatus(msg, kind) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'show ' + (kind || 'info');
}
function setProgress(pct) {
  const wrap = document.getElementById('progress');
  wrap.hidden = false;
  wrap.querySelector('span').style.width = pct + '%';
}

function uploadOne(file, fields, onProgress) {
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', UPLOAD_PRESET);
    for (const [k,v] of Object.entries(fields)) fd.append(k, v);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);
    xhr.upload.onprogress = (e) => { if (e.lengthComputable && onProgress) onProgress(e.loaded / e.total); };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
      else reject(new Error('Upload failed: ' + xhr.status + ' ' + xhr.responseText));
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.send(fd);
  });
}

document.getElementById('upload-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit');
  btn.disabled = true;

  const title = document.getElementById('title').value.trim() || 'Project';
  const before = document.getElementById('before').files[0];
  const after  = document.getElementById('after').files[0];
  if (!before || !after) { setStatus('Pick a before and after photo.', 'err'); btn.disabled = false; return; }

  const pairId = 'p' + Date.now().toString(36);
  const safeTitle = title.replace(/\|/g, '/'); // pipe is a context delimiter in Cloudinary

  try {
    setStatus('Uploading before photo…', 'info');
    setProgress(0);
    await uploadOne(before, {
      tags: 'portfolio',
      context: `pair_id=${pairId}|role=before|title=${safeTitle}`
    }, pct => setProgress(pct * 50));

    setStatus('Uploading after photo…', 'info');
    await uploadOne(after, {
      tags: 'portfolio',
      context: `pair_id=${pairId}|role=after|title=${safeTitle}`
    }, pct => setProgress(50 + pct * 50));

    setStatus('✅ Uploaded! It\u2019ll appear on the site within a minute.', 'ok');
    setProgress(100);
    document.getElementById('upload-form').reset();
    document.getElementById('before-preview').hidden = true;
    document.getElementById('after-preview').hidden = true;
    document.getElementById('before-field').classList.remove('filled');
    document.getElementById('after-field').classList.remove('filled');
    setTimeout(() => { document.getElementById('progress').hidden = true; loadRecent(); }, 1500);
  } catch (err) {
    console.error(err);
    setStatus('Upload failed — ' + err.message, 'err');
  } finally {
    btn.disabled = false;
  }
});

// ---------- Recent uploads (read Cloudinary list endpoint) ----------
async function loadRecent() {
  const el = document.getElementById('recent');
  el.innerHTML = 'Loading…';
  try {
    const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/portfolio.json`, { cache: 'no-store' });
    if (!res.ok) throw new Error('list endpoint returned ' + res.status);
    const data = await res.json();
    const pairs = {};
    for (const r of (data.resources || [])) {
      const ctx = (r.context && (r.context.custom || r.context)) || {};
      const pid = ctx.pair_id || r.public_id;
      if (!pairs[pid]) pairs[pid] = { title: ctx.title || 'Project', when: r.created_at, before: null, after: null };
      const thumb = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/c_fill,w_120,h_120,q_auto,f_auto/${r.public_id}.jpg`;
      pairs[pid][ctx.role || 'before'] = thumb;
      if (r.created_at && (!pairs[pid].when || r.created_at > pairs[pid].when)) pairs[pid].when = r.created_at;
    }
    const items = Object.values(pairs).sort((a,b) => (b.when || '').localeCompare(a.when || ''));
    if (!items.length) { el.innerHTML = '<p style="color:var(--muted);font-size:14px;margin:0">No uploads yet. Add your first one above!</p>'; return; }
    el.innerHTML = items.slice(0, 20).map(p => `
      <div class="g-item">
        <img src="${p.before || ''}" alt="Before" />
        <img src="${p.after  || ''}" alt="After" />
        <div class="meta"><b>${escapeHtml(p.title)}</b><small>${p.when ? new Date(p.when).toLocaleString() : ''}</small></div>
      </div>
    `).join('');
  } catch (err) {
    el.innerHTML = `<p style="color:var(--muted);font-size:14px;margin:0">
      Can\u2019t load the list yet. If this is your first upload, give Cloudinary a minute.
      Otherwise, check that \u201CResource list\u201D is enabled in Cloudinary settings.<br/>
      <small>${escapeHtml(String(err.message || err))}</small>
    </p>`;
  }
}
document.getElementById('refresh').addEventListener('click', loadRecent);

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
</script>
</body>
</html>
